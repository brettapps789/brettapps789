<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #24292e;
      color: #fff;
      padding: 1.5rem 2rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; }
    header p  { margin-top: 0.5rem; opacity: 0.75; font-size: 1rem; }
    main {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      flex: 1;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1.25rem; margin-bottom: 0.75rem; color: #24292e; }
    .card p  { line-height: 1.7; color: #555; }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #888;
      border-top: 1px solid #e1e4e8;
    }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>My Page Title</h1>
    <p>A brief tagline or description goes here</p>
  </header>

  <main>
    <div class="card">
      <h2>About</h2>
      <p>
        This is the main content area. Replace this text with whatever you'd
        like to say. You can add as many cards as you need.
      </p>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <p>
        Reach out at <a href="mailto:hello@example.com">hello@example.com</a>.
      </p>
    </div>
  </main>

  <footer>
    <p>Published with ❤️ on <a href="https://pages.github.com">GitHub Pages</a></p>
  </footer>
</body>
</html>
